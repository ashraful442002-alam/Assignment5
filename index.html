<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style/style.css">
    
  <!-- Tailwind + daisyUI -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

  <!-- Geist Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="assets/github-logo.png" 
             alt="GitHub" class="w-8 h-8"/>
        <h1 class="text-xl font-semibold text-gray-800">GitHub Issues Tracker</h1>
      </div>

      <div class="flex items-center gap-4">
        <div class="relative w-80">
          <input id="searchInput" type="text" 
                 class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-600"
                 placeholder="Search issues..." />
          <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3 text-gray-400"></i>
        </div>
        <button onclick="alert('New Issue feature coming soon!')" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg flex items-center gap-2 font-medium transition">
          <i class="fa-solid fa-plus"></i> New Issue
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Tabs -->
    <div class="flex border border-gray-200 mb-8 gap-4 rounded-lg p-1 bg-gray-100">
      <button onclick="switchTab('all', this)" 
              class="tab-button active px-8 py-4 text-lg font-medium rounded-md transition-all">
          All
      </button>
      <button onclick="switchTab('open', this)" 
              class="tab-button px-8 py-4 text-lg font-medium text-gray-600 hover:text-gray-800 rounded-md transition-all">
          Open
      </button>
      <button onclick="switchTab('closed', this)" 
              class="tab-button px-8 py-4 text-lg font-medium text-gray-600 hover:text-gray-800 rounded-md transition-all">
          Closed
      </button>
    </div>

    <!-- Issues Info -->
    <div class="max-w-7xl px-6 py-5 flex items-center justify-between border border-gray-200 rounded-lg mb-6">
      <div class="flex items-center gap-3">
        <img src="assets/Aperture.png" alt="">
        <div>
          <h2 id="issueCount" class="text-2xl font-semibold text-gray-800">50 Issues</h2>
          <p class="text-gray-500">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex gap-6 text-sm text-gray-600">
        <span class="flex items-center gap-1.5">
          <span class="w-3 h-3 bg-emerald-500 rounded-full px-2"></span> Open
        </span>
        <span class="flex items-center gap-1.5">
          <span class="w-3 h-3 bg-purple-500 rounded-full mx-2"></span> Closed
        </span>
      </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="hidden flex justify-center py-12">
      <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-purple-600"></div>
    </div>

    <!-- Issues Grid -->
    <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
      <!-- JS will insert cards here -->
    </div>
  </div>

  <!-- Issue Detail Modal -->
  <div id="issueModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden">
      <div class="p-6 border-b flex justify-between items-center">
        <h3 class="text-xl font-semibold" id="modalTitle"></h3>
        <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 text-2xl leading-none">×</button>
      </div>
      <div class="p-6 overflow-auto max-h-[70vh]" id="modalBody">
        <!-- Filled by JS -->
      </div>
      <div class="p-4 border-t flex justify-end">
        <button onclick="closeModal()" 
                class="px-6 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg font-medium">
          Close
        </button>
      </div>
    </div>
  </div>

 <!-- JavaScript -->
  <script src="js/index.js"></script>
</body>
</html>
