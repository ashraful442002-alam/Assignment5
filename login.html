<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - GitHub Issues Tracker</title>
  <link rel="stylesheet" href="style/style.css">

  <!-- Tailwind + daisyUI -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

  <!-- Geist Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
        crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    body {
      font-family: 'Geist', system-ui, sans-serif;
    }

    .card {
      
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.842);
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center ">

  <div class="max-w-2xl w-full mx-auto p-4 sm:p-6 lg:p-8">
    
    <div class="card bg-white rounded-[8px] p-10 px-4 sm:p-12 lg:p-14 shadow-xl">

      <!-- GitHub Logo -->
      <div class="flex justify-center mb-6">
        <img src="assets/github-logo.png" 
             alt="GitHub Logo" 
             class="w-16 h-16 sm:w-20 sm:h-20"/>
      </div>

      <h1 class="text-2xl sm:text-3xl font-semibold text-center text-gray-800">
        GitHub Issues Tracker
      </h1>
      <p class=" text-center text-gray-500 mt-2 text-sm sm:text-base">
        Sign in to manage your issues
      </p>

      <!-- Login Form -->
      <form id="loginForm" class="mt-8 space-y-6">
        
        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium text-gray-700">Username</span>
          </label>
          <input type="text" id="username" 
                 class="input input-bordered w-full focus:border-blue-600 focus:ring-0"
                 placeholder="Enter Username" required />
          <p class="text-xs text-blue-600 mt-1.5">
            Default: <span class="font-mono bg-purple-100 px-1.5 py-0.5 rounded">admin</span>
          </p>
        </div>

        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium text-gray-700">Password</span>
          </label>
          <input type="password" id="password" 
                 class="input input-bordered w-full focus:border-blue-600 focus:ring-0"
                 placeholder="Enter Password" required />
          <p class="text-xs text-blue-600 mt-1.5">
            Default: <span class="font-mono bg-purple-100 px-1.5 py-0.5 rounded">admin123</span>
          </p>
        </div>

        <button type="submit"
                class="btn btn-primary w-full text-base font-semibold h-12 bg-blue-600 hover:bg-blue-700 border-0">
          Sign In
        </button>
      </form>

      <div class="divider my-8 text-gray-400 text-sm font-medium">OR</div>

      <!-- Demo Credentials -->
      <div class="text-center bg-gray-50 border border-gray-200 rounded-2xl p-5 text-sm">
        <p class="font-semibold text-gray-500 mb-3">Demo Credentials:</p>
        <div class="space-y-2 text-gray-600">
          <p><span class="font-mono font-bold text-black-400 ">Username:</span> <span class="font-medium">admin</span></p>
          <p><span class="font-mono font-bold text-black-400">Password:</span> <span class="font-medium">admin123</span></p>
        </div>
      </div>

    </div>
  </div>

  <!-- JavaScript -->
  <script src="js/login.js"></script>
</body>
</html>
